name: meet_up
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.2.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.2
  cloud_firestore: ^4.15.8
  firebase_core: ^2.26.0
  flutter_screenutil: ^5.9.0
  go_router: ^13.2.0
  firebase_auth: ^4.17.7
  provider: ^6.1.2
  dotenv: ^4.2.0
  auto_size_text: ^3.0.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
  - assets/images/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
        - asset: assets/fonts/Pretendard-Medium.otf

    - family: Pretendard-M
      fonts:
        - asset: assets/fonts/Pretendard-Medium.otf

    - family: Pretendard-SB
      fonts:
          - asset: assets/fonts/Pretendard-SemiBold.otf

    - family: SUITE
      fonts:
        - asset: assets/fonts/SUITE-Regular.ttf
        - asset: assets/fonts/SUITE-Medium.ttf
        - asset: assets/fonts/SUITE-SemiBold.ttf

    - family: SUITE-SB
      fonts:
        - asset: assets/fonts/SUITE-SemiBold.ttf

    - family: SUITE-L
      fonts:
        - asset: assets/fonts/SUITE-Light.ttf